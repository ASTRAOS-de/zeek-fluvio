name: Release

on:
  pull_request:
    types: [closed]
    branches:
      - main
      - dev

permissions:
  contents: write
  issues: write

jobs:
  validate_branch:
    if: "${{ github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true }}"
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.branch.outputs.ref }}
      branch_name: ${{ steps.branch.outputs.branch_name }}
    steps:
      - name: Capture branch metadata
        id: branch
        run: |
          echo "ref=${{ github.event.pull_request.base.ref }}" >> "$GITHUB_OUTPUT"
          echo "branch_name=${{ github.event.pull_request.head.ref }}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate branch name
        run: |
          set -euo pipefail
          BRANCH_NAME="${{ github.event.pull_request.head.ref }}"
          echo "Validating branch: $BRANCH_NAME"
          case "$BRANCH_NAME" in
            release/*|feature/*|patch/*) ;;
            *)
              echo "ERROR: branch '$BRANCH_NAME' does not match allowed prefixes (release/*, feature/*, patch/*)."
              exit 1
              ;;
          esac

  compatibility:
    needs: validate_branch
    if: "${{ github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true }}"
    uses: ./.github/workflows/compatibility.yml
    with:
      ref: ${{ needs.validate_branch.outputs.ref }}
    secrets: inherit

  release_from_pr:
    needs: [validate_branch, compatibility]
    if: "${{ github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true }}"
    runs-on: ubuntu-latest
    steps:
      - name: Check Variables for Token creation
        run: |
          if [[ -z "${{ vars.CICD_APP_CLIENT_ID }}" ]]; then
            echo "ERROR: Missing variable CICD_APP_CLIENT_ID"
            exit 1
          fi
          if [[ -z "${{ secrets.CICD_APP_SECRET_KEY }}" ]]; then
              echo "ERROR: Missing secret CICD_APP_SECRET_KEY"
              exit 1
          fi
      - name: Generate a token
        uses: actions/create-github-app-token@v3
        id: generate-token
        with:
          client-id: ${{ vars.CICD_APP_CLIENT_ID }}
          private-key: ${{ secrets.CICD_APP_SECRET_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Bump VERSION, commit and tag
        env:
          BRANCH_NAME: "${{ needs.validate_branch.outputs.branch_name }}"
          GITHUB_TOKEN: "${{ steps.generate-token.outputs.token }}"
          GITHUB_REPOSITORY: "${{ github.repository }}"
          TARGET_BRANCH: "${{ needs.validate_branch.outputs.ref }}"
        run: |
          set -euo pipefail

          VERSION_FILE="$(pwd)/VERSION"
          if [ ! -f "$VERSION_FILE" ]; then
            echo "0.0.0" > "$VERSION_FILE"
          fi

          OLD_VERSION="$(tr -d ' \n\r' < "$VERSION_FILE")"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$OLD_VERSION"

          case "$BRANCH_NAME" in
            release/*)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            feature/*)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch/*)
              PATCH=$((PATCH + 1))
              ;;
            *)
              echo "ERROR: branch '$BRANCH_NAME' does not match allowed prefixes (release/*, feature/*, patch/*)."
              exit 1
              ;;
          esac

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "Bumping version: $OLD_VERSION -> $NEW_VERSION"
          printf '%s\n' "$NEW_VERSION" > "$VERSION_FILE"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$VERSION_FILE"
          git commit -m "ci: bump version to v$NEW_VERSION [skip ci]" || true

          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin "HEAD:refs/heads/${TARGET_BRANCH}"

          git tag -a "v$NEW_VERSION" -m "Release v$NEW_VERSION"
          git push origin "refs/tags/v$NEW_VERSION"

      - name: Read VERSION file
        id: get_version
        run: |
          echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release for tag
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "v${{ steps.get_version.outputs.version }}"
          generate_release_notes: true
        env:
          GITHUB_TOKEN: "${{ steps.generate-token.outputs.token }}"

